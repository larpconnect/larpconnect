# LarpConnect Dependencies and Plugins Version Catalog
# Centralized definitions for third-party libraries and Gradle plugins.

[versions]
# Core Runtime Libraries
guava = "33.6.0-jre"
guice = "7.0.0"
mug = "10.4.3"
vertx = "5.1.2"
hibernate = "7.4.2.Final"
postgresql = "42.7.11"
caffeine = "3.2.4"
rabbitmq = "5.32.0"
slf4j = "2.0.18"
logback = "1.5.34"
errorprone-core = "2.50.0"

# Testing Frameworks
assertj = "3.27.7"
junit = "6.1.0"
mockito = "5.23.0"
cucumber = "7.34.3"

# Build Quality Plugins
spotless = "8.7.0"
spotbugs = "6.5.8"
errorprone-plugin = "5.1.0"

[libraries]
guava = { group = "com.google.guava", name = "guava", version.ref = "guava" }
guice = { group = "com.google.inject", name = "guice", version.ref = "guice" }
mug = { group = "com.google.mug", name = "mug", version.ref = "mug" }
vertx-core = { group = "io.vertx", name = "vertx-core", version.ref = "vertx" }
vertx-web = { group = "io.vertx", name = "vertx-web", version.ref = "vertx" }
hibernate-core = { group = "org.hibernate.orm", name = "hibernate-core", version.ref = "hibernate" }
postgresql = { group = "org.postgresql", name = "postgresql", version.ref = "postgresql" }
caffeine = { group = "com.github.ben-manes.caffeine", name = "caffeine", version.ref = "caffeine" }
rabbitmq-amqp = { group = "com.rabbitmq", name = "amqp-client", version.ref = "rabbitmq" }
slf4j-api = { group = "org.slf4j", name = "slf4j-api", version.ref = "slf4j" }
logback-classic = { group = "ch.qos.logback", name = "logback-classic", version.ref = "logback" }
errorprone-core = { group = "com.google.errorprone", name = "error_prone_core", version.ref = "errorprone-core" }

# Test dependencies
assertj-core = { group = "org.assertj", name = "assertj-core", version.ref = "assertj" }
junit-jupiter = { group = "org.junit.jupiter", name = "junit-jupiter", version.ref = "junit" }
mockito-core = { group = "org.mockito", name = "mockito-core", version.ref = "mockito" }
cucumber-java = { group = "io.cucumber", name = "cucumber-java", version.ref = "cucumber" }
cucumber-junit-platform-engine = { group = "io.cucumber", name = "cucumber-junit-platform-engine", version.ref = "cucumber" }

# Plugin artifacts for build-logic dependencies
spotless-plugin = { group = "com.diffplug.spotless", name = "spotless-plugin-gradle", version.ref = "spotless" }
spotbugs-plugin = { group = "com.github.spotbugs.snom", name = "spotbugs-gradle-plugin", version.ref = "spotbugs" }
errorprone-plugin-dep = { group = "net.ltgt.gradle", name = "gradle-errorprone-plugin", version.ref = "errorprone-plugin" }

[plugins]
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
spotbugs = { id = "com.github.spotbugs", version.ref = "spotbugs" }
errorprone = { id = "net.ltgt.errorprone", version.ref = "errorprone-plugin" }
