schema: spec-driven

context: |
  Project: Modular, tenanted, federated server platform for connecting larpers and larp studios
  Tech stack: Java 25, Gradle w/ Kotlin DSL, OpenAPI, PSQL 18+, RabbitMQ, memcached, HAProxy, S3
  Core libraries: Vert.x, Hibernate, Guice, Guava, Mug, Caffeine, Jackson, slf4j + logback
  Testing: JUnit 6, Mockito, Testcontainers, Cucumber, AssertJ
  Context for agents: AGENTS.md, DESIGN.md, README.md, CONTRIBUTING.md, .agents/skill/**
  Policies:
    - High code coverage requirements. All code must be unit tested and, if applicable, integration tested
    - Significant use of code quality tools, including archunit, checkstyle, spotless, and errorprone

rules:
  specs:
     - Use GIVEN/WHEN/THEN
     - Use RFC 2119 (MUST, SHOULD, MAY)
  design:
     - Where applicable, include any observability, security, or migration considerations.
  tasks:
    - Include explicit tasks for unit and integration tests
    - Include explicit `./gradlew spotlessApply` and `./gradlew check build` tasks
  verify:
    - ./gradlew check build