syntax = "proto3";

package com.larpconnect.njall.proto;

import "google/protobuf/any.proto";

option java_multiple_files = true;
option java_package = "com.larpconnect.njall.proto";
option go_package = "com.larpconnect.njall.proto";

message Observability {
  uint32 version = 1;
  bytes trace_id = 2; // 16 bytes
  bytes span_id = 3; // 8 bytes
  uint32 flags = 4; // 1 byte
}

message ProtoDef {
  string protobuf_name = 1;
  google.protobuf.Any message = 2;
}

message MimeType {
  string type = 1;
  string subtype = 2;
  bytes content = 3;
}

enum AuthStatus {
  SUCCEEDED = 0;
  FAILED = 1;
}

message Authentication {
  string username = 1;
  AuthStatus status = 2;
}

message Header {
  repeated string accept = 1;
}

message Parameter {
  string key = 1;
  oneof value {
    string string_value = 2;
  }
}

message MessageRequest {
  Observability traceparent = 1;
  Authentication authentication = 4;
  Header header = 5;
  repeated Parameter parameters = 6;

  oneof payload {
    ProtoDef proto = 2;
    MimeType mime = 3;
  }
}

